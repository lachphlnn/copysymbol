<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>기호 복사 사이트</title>
  <style>
    body { font-family: Arial; text-align: center; }
    h2 { margin-top: 30px; }
    button {
      font-size: 20px;
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }
    #toast {
  visibility: hidden;
  min-width: 120px;
  background-color: #333;
  color: white;
  text-align: center;
  border-radius: 20px;
  padding: 10px;
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.3s, bottom 0.3s;
}

#toast.show {
  visibility: visible;
  opacity: 1;
  bottom: 50px;
}
    #output {
  min-height: 40px;
  border: 1px solid #ccc;
  margin: 10px;
  padding: 10px;
  font-size: 24px;
}
    
  </style>
</head>
<body>

<h1>📋 기호 복사</h1>

<h2>윗첨자</h2>
<div id="superscript"></div>

<h2>아랫첨자</h2>
<div id="subscript"></div>

<h2>그리스 문자</h2>
<div id="greek"></div>

<script>
function copyText(text) {
  navigator.clipboard.writeText(text);

  const toast = document.getElementById("toast");
  toast.textContent = text + " 복사됨!";
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 1500);
}
  let combinedText = "";

function addText(char) {
  combinedText += char;
  document.getElementById("output").textContent = combinedText;
}

function copyCombined() {
  navigator.clipboard.writeText(combinedText);

  const toast = document.getElementById("toast");
  toast.textContent = combinedText + " 복사됨!";
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 1500);
}

function clearCombined() {
  combinedText = "";
  document.getElementById("output").textContent = "";
}
  

function createButtons(list, elementId) {
  const container = document.getElementById(elementId);
  list.forEach(char => {
    const btn = document.createElement("button");
    btn.textContent = char;

    // 👇 여기 수정됨
    btn.onclick = () => copyText(char);

    btn.oncontextmenu = (e) => {
      e.preventDefault();
      addText(char);
    };

    container.appendChild(btn);
  });
}

// 윗첨자
createButtons(
  ["⁰","¹","²","³","⁴","⁵","⁶","⁷","⁸","⁹"],
  "superscript"
);

// 아랫첨자
createButtons(
  ["₀","₁","₂","₃","₄","₅","₆","₇","₈","₉"],
  "subscript"
);

// 그리스 문자 (자주 쓰는 것)
createButtons(
  ["α","β","γ","Δ","δ","ε","θ","λ","μ","π","σ","Ω"],
  "greek"
);
</script>
  
<div id="toast">복사됨!</div>

  <h2>조합 복사</h2>
<div id="output"></div>

<button onclick="copyCombined()">복사하기</button>
<button onclick="clearCombined()">초기화</button>
  
</body>
</html>
